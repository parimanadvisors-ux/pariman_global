<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POPMS — Pariman Office Policy Management System</title>
<style>
/* ============================================================
   POPMS — Pariman Global Consulting Consulting
   Theme: Blue • Green • Gold
   ============================================================ */
:root{
  --blue-900:#0B2545;
  --blue-700:#0F4C81;
  --blue-500:#1E6FB8;
  --blue-50:#EAF2FA;
  --green-700:#0E7A4E;
  --green-500:#1AA86A;
  --green-50:#E6F5EE;
  --gold-600:#B98A2C;
  --gold-500:#D4A74A;
  --gold-50:#FBF3DD;
  --ink-900:#0F1B2D;
  --ink-700:#23344A;
  --ink-500:#5A6B82;
  --ink-300:#94A3B8;
  --line:#E4E9F0;
  --bg:#F4F7FB;
  --card:#FFFFFF;
  --danger:#D33A3A;
  --danger-50:#FCE9E9;
  --warn:#C77A00;
  --shadow:0 1px 2px rgba(15,27,45,.06), 0 6px 18px rgba(15,27,45,.06);
  --shadow-lg:0 10px 30px rgba(15,27,45,.12);
  --radius:14px;
  --radius-sm:10px;
  --radius-lg:18px;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:var(--sans);color:var(--ink-900);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink-900)}
a{color:var(--blue-700);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cdd5e0;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#a8b3c1}

/* ============================================================
   LOGIN
   ============================================================ */
#loginScreen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(30,111,184,.18), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, rgba(26,168,106,.18), transparent 55%),
    linear-gradient(135deg,#F4F7FB 0%, #EAF2FA 100%);
  padding:20px;
  z-index:100;
}
.login-card{
  width:100%;max-width:440px;background:#fff;border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);overflow:hidden;
}
.login-brand{
  background:linear-gradient(135deg,var(--blue-900) 0%, var(--blue-700) 70%, var(--green-700) 130%);
  color:#fff;padding:32px 32px 26px;text-align:center;
}
.brand-logo{
  width:64px;height:64px;border-radius:16px;background:#fff;display:inline-flex;
  align-items:center;justify-content:center;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden;
}
.brand-logo svg{width:42px;height:42px}
.brand-logo img{display:block;max-width:100%;max-height:100%;object-fit:contain}
.brand-logo-full{width:200px;height:200px;border-radius:20px;padding:10px;background:#fff}
.brand-logo-full img{width:100%;height:100%;object-fit:contain}
.brand-logo-emblem img{width:34px;height:34px;border-radius:6px}
.login-brand h1{margin:0 0 4px;font-size:22px;letter-spacing:.2px}
.login-brand p{margin:0;opacity:.85;font-size:13px;color:var(--gold-500)}
.login-body{padding:28px 32px 30px}
.login-tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:22px}
.login-tab{flex:1;padding:10px 12px;border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-500);text-align:center;transition:all .15s}
.login-tab.active{background:#fff;color:var(--blue-700);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:13px;font-weight:600;color:var(--ink-700);margin-bottom:6px}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  transition:border-color .15s, box-shadow .15s;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{
  outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(30,111,184,.15);
}
.form-field textarea{resize:vertical;min-height:80px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;
  transition:transform .05s, box-shadow .15s, background .15s, color .15s;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue-700);color:#fff}
.btn-primary:hover{background:var(--blue-900)}
.btn-gold{background:var(--gold-500);color:#3a2a00}
.btn-gold:hover{background:var(--gold-600);color:#fff}
.btn-green{background:var(--green-700);color:#fff}
.btn-green:hover{background:#0a5e3d}
.btn-ghost{background:transparent;color:var(--ink-700);border:1.5px solid var(--line)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a82e2e}
.btn-block{width:100%}
.btn-sm{padding:7px 11px;font-size:13px;border-radius:8px}
.btn-icon{padding:8px;border-radius:8px;color:var(--ink-500)}
.btn-icon:hover{background:var(--bg);color:var(--blue-700)}
.login-hint{
  margin-top:14px;padding:10px 12px;background:var(--blue-50);color:var(--blue-700);
  border-radius:10px;font-size:12.5px;text-align:center;
}

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app{display:none;min-height:100vh}
#app.show{display:grid;grid-template-columns:260px 1fr;grid-template-rows:64px 1fr;
  grid-template-areas:"sidebar topbar" "sidebar main";min-height:100vh}
#app.collapsed{grid-template-columns:72px 1fr}

aside#sidebar{
  grid-area:sidebar;background:linear-gradient(180deg,var(--blue-900) 0%, var(--blue-700) 100%);
  color:#fff;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:10;
}
.side-brand{
  padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08);
  min-height:64px;
}
.side-brand .brand-logo{width:38px;height:38px;border-radius:10px;margin:0;flex-shrink:0}
.side-brand .brand-logo svg{width:24px;height:24px}
.side-brand-text{overflow:hidden;white-space:nowrap}
.side-brand-text h2{margin:0;font-size:15px;font-weight:700;letter-spacing:.3px}
.side-brand-text p{margin:0;font-size:11px;color:var(--gold-500);letter-spacing:.4px}
#app.collapsed .side-brand-text{display:none}
.side-nav{flex:1;padding:14px 10px;overflow-y:auto}
.side-section-label{font-size:10.5px;color:rgba(255,255,255,.45);font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;padding:14px 14px 6px}
#app.collapsed .side-section-label{display:none}
.side-link{
  display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;color:rgba(255,255,255,.85);
  font-weight:500;font-size:14px;margin:2px 0;cursor:pointer;transition:background .15s;
}
.side-link:hover{background:rgba(255,255,255,.08)}
.side-link.active{background:rgba(212,167,74,.18);color:#fff;box-shadow:inset 3px 0 0 var(--gold-500)}
.side-link svg{width:18px;height:18px;flex-shrink:0;opacity:.9}
.side-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#app.collapsed .side-link span{display:none}
#app.collapsed .side-link{justify-content:center;padding:11px 10px}

.side-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.signout{
  display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:linear-gradient(135deg,var(--gold-500),var(--gold-600));color:#2a1d00;
  padding:11px 14px;border-radius:11px;font-weight:700;font-size:13.5px;
  box-shadow:0 4px 14px rgba(212,167,74,.35);transition:transform .08s, box-shadow .15s;
}
.signout:hover{box-shadow:0 6px 18px rgba(212,167,74,.5)}
.signout svg{width:16px;height:16px}
#app.collapsed .signout span{display:none}

header#topbar{
  grid-area:topbar;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;
  position:sticky;top:0;z-index:5;
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.menu-toggle{
  padding:9px;border-radius:9px;color:var(--ink-700);
}
.menu-toggle:hover{background:var(--bg)}
.page-title{font-size:18px;font-weight:700;color:var(--ink-900);margin:0}
.page-subtitle{font-size:12.5px;color:var(--ink-500);margin:2px 0 0}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-chip{
  display:flex;align-items:center;gap:10px;background:var(--bg);padding:6px 14px 6px 6px;border-radius:24px;
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--blue-500),var(--green-500));color:#fff;font-weight:700;font-size:13px;
}
.user-meta{display:flex;flex-direction:column;line-height:1.2}
.user-meta strong{font-size:13px;color:var(--ink-900)}
.user-meta span{font-size:11px;color:var(--ink-500)}

main#main{grid-area:main;overflow-y:auto;padding:24px 28px 40px;min-height:0}
.page{max-width:1400px;margin:0 auto}

/* ============================================================
   COMPONENTS — Cards, Tables, Badges
   ============================================================ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
}
.stat-card.blue::before{background:var(--blue-500)}
.stat-card.green::before{background:var(--green-500)}
.stat-card.gold::before{background:var(--gold-500)}
.stat-card.amber::before{background:var(--warn)}
.stat-icon{
  width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.stat-icon svg{width:22px;height:22px}
.stat-card.blue .stat-icon{background:var(--blue-50);color:var(--blue-700)}
.stat-card.green .stat-icon{background:var(--green-50);color:var(--green-700)}
.stat-card.gold .stat-icon{background:var(--gold-50);color:var(--gold-600)}
.stat-card.amber .stat-icon{background:#FFF1DD;color:var(--warn)}
.stat-meta{min-width:0}
.stat-label{font-size:12.5px;color:var(--ink-500);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:26px;font-weight:700;color:var(--ink-900);line-height:1.1;margin-top:4px}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:20px;overflow:hidden;
}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-head h3{margin:0;font-size:15px;font-weight:700;color:var(--ink-900)}
.card-head p{margin:2px 0 0;font-size:12.5px;color:var(--ink-500)}
.card-body{padding:18px 20px}
.card-body.flush{padding:0}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar .search{
  flex:1;min-width:220px;display:flex;align-items:center;gap:8px;
  background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:0 12px;
}
.toolbar .search input{flex:1;border:0;outline:0;padding:10px 0;background:transparent;font-size:14px}
.toolbar .search svg{width:16px;height:16px;color:var(--ink-500)}
.toolbar select{
  padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  font-size:14px;cursor:pointer;
}
.toolbar select:focus{outline:none;border-color:var(--blue-500)}

table.data{width:100%;border-collapse:collapse}
table.data th{
  text-align:left;font-size:11.5px;font-weight:700;color:var(--ink-500);text-transform:uppercase;
  letter-spacing:.6px;padding:12px 16px;background:#FAFBFD;border-bottom:1px solid var(--line);white-space:nowrap;
}
table.data td{padding:14px 16px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink-700);vertical-align:middle}
table.data tr:last-child td{border-bottom:0}
table.data tr:hover td{background:#FAFBFD}
.table-wrap{overflow-x:auto}

.badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;
  font-size:11.5px;font-weight:700;letter-spacing:.2px;
}
.badge.blue{background:var(--blue-50);color:var(--blue-700)}
.badge.green{background:var(--green-50);color:var(--green-700)}
.badge.gold{background:var(--gold-50);color:var(--gold-600)}
.badge.red{background:var(--danger-50);color:var(--danger)}
.badge.gray{background:#EEF1F5;color:var(--ink-500)}
.badge.new{
  background:linear-gradient(135deg,var(--gold-500),var(--gold-600));color:#2a1d00;
  box-shadow:0 2px 6px rgba(212,167,74,.4);
}

.row-actions{display:flex;gap:4px}
.row-actions .btn-icon{padding:6px;border-radius:7px}
.row-actions .btn-icon svg{width:16px;height:16px}
.row-actions .btn-icon.edit{color:var(--blue-700)}
.row-actions .btn-icon.delete{color:var(--danger)}
.row-actions .btn-icon.view{color:var(--green-700)}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--ink-500);
}
.empty-state svg{width:48px;height:48px;color:var(--ink-300);margin-bottom:10px}
.empty-state h4{margin:0 0 4px;color:var(--ink-700);font-size:15px}
.empty-state p{margin:0;font-size:13px}

/* ============================================================
   POLICY LIST (Staff)
   ============================================================ */
.policy-list{display:grid;grid-template-columns:1fr;gap:14px}
.policy-card{
  background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  display:grid;grid-template-columns:180px 1fr auto;gap:20px;align-items:center;
  transition:border-color .15s, box-shadow .15s;
}
.policy-card:hover{border-color:var(--blue-500);box-shadow:var(--shadow)}
.policy-thumb{
  width:180px;height:104px;border-radius:10px;background:#0B2545;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.policy-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.policy-thumb .play{
  position:absolute;width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.policy-thumb .play svg{width:18px;height:18px;color:var(--danger);margin-left:2px}
.policy-thumb.no-video{
  background:linear-gradient(135deg,var(--blue-50),var(--green-50));color:var(--ink-500);
  font-size:12px;font-weight:600;cursor:default;
}
.policy-info h4{margin:0 0 6px;font-size:16px;font-weight:700;color:var(--ink-900);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.policy-info .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-500);margin-bottom:8px}
.policy-info .meta strong{color:var(--ink-700);font-weight:600}
.policy-info .desc{font-size:13.5px;color:var(--ink-700);margin:0;line-height:1.5}
.policy-actions{display:flex;flex-direction:column;gap:8px;min-width:160px}
.policy-actions .btn{width:100%;padding:9px 12px;font-size:13px}
.policy-actions .accepted-stamp{
  display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;
  background:var(--green-50);color:var(--green-700);font-size:12px;font-weight:600;
  text-align:center;justify-content:center;line-height:1.3;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(15,27,45,.55);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;backdrop-filter:blur(4px);
}
.modal{
  background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
}
.modal.lg{max-width:880px}
.modal.xl{max-width:1100px;height:90vh}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;padding:18px 22px;
  border-bottom:1px solid var(--line);
}
.modal-head h3{margin:0;font-size:16px;font-weight:700;color:var(--ink-900)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--line);background:#FAFBFD}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.file-drop{
  border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;
  background:#FAFBFD;cursor:pointer;transition:border-color .15s, background .15s;
}
.file-drop:hover{border-color:var(--blue-500);background:var(--blue-50)}
.file-drop svg{width:28px;height:28px;color:var(--ink-500);margin-bottom:6px}
.file-drop p{margin:0;font-size:13px;color:var(--ink-700)}
.file-drop small{font-size:11.5px;color:var(--ink-500)}
.file-current{
  display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--blue-50);
  border-radius:10px;font-size:13px;color:var(--blue-700);margin-top:8px;
}
.file-current svg{width:16px;height:16px;flex-shrink:0}

.thumb-preview{
  width:100%;max-width:280px;aspect-ratio:16/9;border-radius:10px;background:#000;overflow:hidden;
  position:relative;margin-top:8px;
}
.thumb-preview img{width:100%;height:100%;object-fit:cover;display:block}

.declaration{
  background:linear-gradient(135deg,var(--gold-50),#fff);border:1px solid var(--gold-500);
  border-radius:12px;padding:18px 20px;margin-top:20px;
}
.declaration h4{margin:0 0 8px;color:var(--gold-600);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.declaration p{margin:0;color:var(--ink-700);font-size:13.5px;line-height:1.6}
.sign-row{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:16px;margin-top:18px}
.sign-row .field label{font-size:11.5px;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.sign-row .field .val{font-size:13.5px;color:var(--ink-900);font-weight:600;padding:8px 0;border-bottom:1.5px solid var(--ink-300)}
.sign-box{
  height:80px;border:1.5px dashed var(--ink-300);border-radius:10px;background:#fff;
  display:flex;align-items:flex-end;justify-content:center;padding:6px;font-size:11px;color:var(--ink-300);
}

/* ============================================================
   TOASTS & MISC
   ============================================================ */
#toastRoot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{
  background:var(--ink-900);color:#fff;padding:12px 16px;border-radius:10px;font-size:13.5px;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:220px;
  animation:toastIn .25s ease;
}
.toast.success{background:var(--green-700)}
.toast.error{background:var(--danger)}
.toast.warn{background:var(--warn)}
.toast svg{width:16px;height:16px;flex-shrink:0}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.storage-meter{margin-top:12px}
.storage-bar{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;margin-top:6px}
.storage-fill{height:100%;background:linear-gradient(90deg,var(--green-500),var(--blue-500));transition:width .3s}
.storage-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-500)}

.report-block{margin-bottom:22px}
.report-block h4{margin:0 0 8px;font-size:14px;color:var(--ink-900);font-weight:700;display:flex;align-items:center;gap:10px}
.report-block h4 .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500)}

.kvgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;background:var(--bg);padding:16px;border-radius:12px;margin-bottom:18px}
.kv{display:flex;flex-direction:column}
.kv label{font-size:11px;color:var(--ink-500);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kv strong{font-size:14px;color:var(--ink-900);font-weight:600;margin-top:2px}

.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.category-tile{
  background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;gap:8px;
}
.category-tile:hover{border-color:var(--blue-500);transform:translateY(-2px);box-shadow:var(--shadow)}
.category-tile.active{border-color:var(--gold-500);background:var(--gold-50)}
.category-tile .ci{
  width:42px;height:42px;border-radius:10px;background:var(--blue-50);color:var(--blue-700);
  display:flex;align-items:center;justify-content:center;
}
.category-tile .ci svg{width:22px;height:22px}
.category-tile h4{margin:0;font-size:14px;color:var(--ink-900);font-weight:700}
.category-tile .count{font-size:12px;color:var(--ink-500)}

.tag{
  display:inline-block;padding:3px 8px;background:var(--blue-50);color:var(--blue-700);border-radius:6px;
  font-size:11.5px;font-weight:600;
}

@media (max-width:920px){
  #app.show{grid-template-columns:0 1fr;grid-template-areas:"topbar topbar" "main main"}
  #app.show aside#sidebar{position:fixed;left:-260px;top:0;bottom:0;width:260px;transition:left .25s}
  #app.show.mobile-open aside#sidebar{left:0;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  #app.show.mobile-open::after{content:"";position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9}
  .stat-grid{grid-template-columns:1fr 1fr}
  .policy-card{grid-template-columns:1fr;gap:14px}
  .policy-thumb{width:100%;height:180px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  main#main{padding:18px 16px 30px}
  .page-title{font-size:16px}
}
@media (max-width:520px){
  .stat-grid{grid-template-columns:1fr}
  .sign-row{grid-template-columns:1fr}
}

/* Print styles for reports */
@media print{
  #sidebar,#topbar,.toolbar,.modal-foot,.no-print,.row-actions,.card-head .btn{display:none !important}
  body,html{background:#fff}
  main#main{padding:0;overflow:visible}
  #app.show{display:block;grid-template-columns:1fr}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
  .modal-backdrop{position:static;background:none;padding:0}
  .modal{box-shadow:none;max-width:100%;max-height:none;border-radius:0}
  .modal-head{border-bottom:2px solid #000}
}
</style>
</head>

/* ---------- REST-BACKED DATA LAYER (Flask + Postgres) ----------
   Same function signatures as the old IndexedDB layer, so the rest of
   the app (which only ever calls dbGetAll/dbGet/dbAdd/dbPut/dbDel/dbClear)
   needs no changes. */
const STORES=['users','categories','policies','archives','acceptances','docViews','videoViews','settings','monthlyCerts'];
const API='/api';

async function apiFetch(path,opts={}){
  const res=await fetch(API+path,{
    headers:{'Content-Type':'application/json'},
    credentials:'same-origin',
    ...opts,
  });
  if(!res.ok){
    let msg='Request failed';
    try{ const j=await res.json(); msg=j.error||msg; }catch(e){}
    throw new Error(msg);
  }
  if(res.status===204) return null;
  return res.json();
}

function dbGetAll(store){ return apiFetch(`/${store}`); }

function dbGet(store,id){
  if(store==='settings') return apiFetch(`/settings/${id}`).catch(()=>undefined);
  return apiFetch(`/${store}/${id}`).catch(()=>undefined);
}

function dbAdd(store,obj){
  if(store==='settings') return apiFetch(`/settings`,{method:'POST',body:JSON.stringify(obj)}).then(r=>r.key);
  return apiFetch(`/${store}`,{method:'POST',body:JSON.stringify(obj)}).then(r=>r.id);
}

function dbPut(store,obj){
  if(store==='settings') return apiFetch(`/settings/${obj.key}`,{method:'PUT',body:JSON.stringify(obj)}).then(r=>r.key);
  return apiFetch(`/${store}/${obj.id}`,{method:'PUT',body:JSON.stringify(obj)}).then(r=>r.id);
}

function dbDel(store,id){
  if(store==='settings') return apiFetch(`/settings/${id}`,{method:'DELETE'}).then(()=>{});
  return apiFetch(`/${store}/${id}`,{method:'DELETE'}).then(()=>{});
}

function dbClear(store){ return apiFetch(`/${store}/clear`,{method:'POST'}).then(()=>{}); }

async function openDB(){ /* no-op: backend owns the database now */ return true; }
async function bootstrapDB(){ /* no-op: backend seeds admin + default categories on first boot */ return true; }

const $=sel=>document.querySelector(sel);
const $$=sel=>document.querySelectorAll(sel);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmtDate=ts=>{ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtDT=ts=>{ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); };
const initials=n=>String(n||'').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase()||'U';
const bytesHuman=b=>{ if(!b) return '0 B'; const u=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(i?2:0)+' '+u[i]; };
const isThisMonth=ts=>{ if(!ts) return false; const d=new Date(ts),n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); };

function toast(msg,type='success'){
  const root=$('#toastRoot');
  const t=document.createElement('div');
  t.className='toast '+type;
  const icon = type==='error'?ICONS.alert:type==='warn'?ICONS.alert:ICONS.okcircle;
  t.innerHTML=icon+'<span>'+esc(msg)+'</span>';
  root.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2800);
}

function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}
function ytThumb(url){ const id=ytId(url); return id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:null; }
function ytEmbed(url){ const id=ytId(url); return id?`https://www.youtube.com/embed/${id}?autoplay=1`:null; }

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(r.error);
    r.readAsDataURL(file);
  });
}

/* ---------- RENDER DISPATCH ---------- */
async function render(){
  const isAdmin=state.user.role==='admin';
  const c=$('#content');
  c.innerHTML='<div class="empty-state">Loading…</div>';
  try{
    if(state.view==='dashboard') c.innerHTML = isAdmin? await renderAdminDashboard() : await renderStaffDashboard();
    else if(state.view==='policies') c.innerHTML = isAdmin? await renderAdminPolicies() : await renderStaffPolicies();
    else if(state.view==='categories') c.innerHTML = await renderCategories(isAdmin);
    else if(state.view==='archive' && isAdmin) c.innerHTML = await renderArchive();
    else if(state.view==='staff' && isAdmin) c.innerHTML = await renderStaff();
    else if(state.view==='reports' && isAdmin) c.innerHTML = await renderAdminReports();
    else if(state.view==='settings' && isAdmin) c.innerHTML = await renderSettings();
    else if(state.view==='myreport' && !isAdmin) c.innerHTML = await renderMyReport();
    else if(state.view==='monthly' && !isAdmin) c.innerHTML = await renderMonthlyCompliance();
    else c.innerHTML='<div class="empty-state">'+ICONS.empty+'<h4>Page not found</h4></div>';
    bindContentHandlers();
  }catch(err){
    console.error(err);
    c.innerHTML='<div class="empty-state">'+ICONS.alert+'<h4>Something went wrong</h4><p>'+esc(err.message)+'</p></div>';
  }
}

                  </div>
                </td>
              </tr>
            `).join('')}</tbody>
          </table></div>`}
      </div>
    </div>
  `;
}

function applyFilters(list, catMap){
  let out = [...list];
  if(state.search){ const q=state.search.toLowerCase(); out=out.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q)); }
  if(state.filterCategory){ out=out.filter(p=>String(p.categoryId)===String(state.filterCategory)); }
  if(state.sortBy==='date') out.sort((a,b)=>b.lastUpdated-a.lastUpdated);
  else if(state.sortBy==='name') out.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(state.sortBy==='cat') out.sort((a,b)=>(catMap[a.categoryId]||'').localeCompare(catMap[b.categoryId]||''));
  return out;
}

        if(!name||!cat){ toast('Name and category required','error'); return; }
        const desc=modalEl.querySelector('#pDesc').value.trim();
        const videoUrl=modalEl.querySelector('#pVideo').value.trim();
        if(videoUrl && !ytId(videoUrl)){ toast('Invalid YouTube URL','error'); return; }

        let docBase64=p.documentBase64||null, docName=p.documentName||null;
        if(newFile){ docBase64=await fileToBase64(newFile); docName=newFile.name; }

        const now=Date.now();
        if(id){
          // archive existing
          await dbAdd('archives',{
            policyId:id, name:p.name, categoryId:p.categoryId, description:p.description||'',
            documentBase64:p.documentBase64||null, documentName:p.documentName||null,
            videoUrl:p.videoUrl||'', versionDate:p.lastUpdated||now, archivedAt:now,
          });
          const updated={id, name, categoryId:+cat, description:desc, videoUrl, documentBase64:docBase64, documentName:docName, lastUpdated:now, createdAt:p.createdAt||now};
          await dbPut('policies',updated);
          toast('Policy updated. Previous version archived.');
        } else {
          await dbAdd('policies',{name,categoryId:+cat,description:desc,videoUrl,documentBase64:docBase64,documentName:docName,lastUpdated:now,createdAt:now});
          toast('Policy created');
        }
        closeModal();
        render();
      });
    }
  });
}

async function viewDocument(policy, source='policies'){

/* ============================================================
   ADMIN — REPORTS
   ============================================================ */
async function renderAdminReports(){
  const [users,policies,cats,acceptances,monthlyCerts] = await Promise.all([
    dbGetAll('users'),dbGetAll('policies'),dbGetAll('categories'),dbGetAll('acceptances'),dbGetAll('monthlyCerts')
  ]);
  const staff=users.filter(u=>u.role==='staff');
  const catMap=Object.fromEntries(cats.map(c=>[c.id,c.name]));
  const policyMap=Object.fromEntries(policies.map(p=>[p.id,p]));
  const userMap=Object.fromEntries(users.map(u=>[u.id,u]));

  const f=state.reportFilters;
  function inRange(ts){
    if(f.from && ts < new Date(f.from).getTime()) return false;
    if(f.to && ts > new Date(f.to).getTime()+86400000) return false;
    return true;
  }

  let bodyHTML='';
  if(state.reportType==='employee'){
    // employee-wise compliance
    const rows = staff
      .filter(s=>!f.employee || String(s.id)===String(f.employee))
      .map(s=>{
        const sAccs = acceptances.filter(a=>a.userId===s.id);
        const filteredPolicies = policies
          .filter(p=>!f.category || String(p.categoryId)===String(f.category))
          .filter(p=>!f.policy || String(p.id)===String(f.policy));
        const accepted = filteredPolicies.filter(p=>sAccs.find(a=>a.policyId===p.id && inRange(a.acceptedAt))).length;
        return {staff:s, total:filteredPolicies.length, accepted, pending:filteredPolicies.length-accepted};
      });
    bodyHTML = `<div class="table-wrap"><table class="data" id="reportTable">
      <thead><tr><th>Employee</th><th>Designation</th><th>Total</th><th>Accepted</th><th>Pending</th><th>Compliance</th></tr></thead>
      <tbody>${rows.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--ink-500);padding:30px">No data</td></tr>':rows.map(r=>{
        const pct = r.total? Math.round(r.accepted*100/r.total):0;
        return `<tr>
          <td><strong>${esc(r.staff.name)}</strong></td>
          <td>${esc(r.staff.designation||'—')}</td>
          <td>${r.total}</td>
          <td><span class="badge green">${r.accepted}</span></td>
          <td><span class="badge ${r.pending?'red':'gray'}">${r.pending}</span></td>
          <td><strong>${pct}%</strong></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  } else if(state.reportType==='policy'){
    // policy-wise acceptance
    const rows = policies
      .filter(p=>!f.category || String(p.categoryId)===String(f.category))
      .filter(p=>!f.policy || String(p.id)===String(f.policy))
      .map(p=>{
        const pAccs = acceptances.filter(a=>a.policyId===p.id && inRange(a.acceptedAt));
        const eligibleStaff = f.employee? staff.filter(s=>String(s.id)===String(f.employee)) : staff;
        const acceptedBy = pAccs.filter(a=>eligibleStaff.find(s=>s.id===a.userId)).length;
        return {policy:p, accepted:acceptedBy, total:eligibleStaff.length, pending:eligibleStaff.length-acceptedBy};
      });
    bodyHTML = `<div class="table-wrap"><table class="data" id="reportTable">
      <thead><tr><th>Policy</th><th>Category</th><th>Total Staff</th><th>Accepted</th><th>Pending</th><th>Acceptance</th></tr></thead>
      <tbody>${rows.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--ink-500);padding:30px">No data</td></tr>':rows.map(r=>{
        const pct = r.total? Math.round(r.accepted*100/r.total):0;
        return `<tr>
          <td><strong>${esc(r.policy.name)}</strong></td>
          <td><span class="tag">${esc(catMap[r.policy.categoryId]||'—')}</span></td>
          <td>${r.total}</td>
          <td><span class="badge green">${r.accepted}</span></td>
          <td><span class="badge ${r.pending?'red':'gray'}">${r.pending}</span></td>
          <td><strong>${pct}%</strong></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  } else if(state.reportType==='pending'){
    // pending acceptance
    const out=[];
    const filteredStaff = f.employee? staff.filter(s=>String(s.id)===String(f.employee)) : staff;
    const filteredPolicies = policies
      .filter(p=>!f.category || String(p.categoryId)===String(f.category))
      .filter(p=>!f.policy || String(p.id)===String(f.policy));
    filteredStaff.forEach(s=>{
      filteredPolicies.forEach(p=>{
        const a = acceptances.find(x=>x.userId===s.id && x.policyId===p.id);
        if(!a){ out.push({staff:s,policy:p}); }
      });
    });
    bodyHTML = `<div class="table-wrap"><table class="data" id="reportTable">
      <thead><tr><th>Employee</th><th>Designation</th><th>Policy</th><th>Category</th></tr></thead>
      <tbody>${out.length===0?'<tr><td colspan="4" style="text-align:center;color:var(--green-700);padding:30px">All staff have accepted all policies ✓</td></tr>':out.map(r=>`
        <tr>
          <td><strong>${esc(r.staff.name)}</strong></td>
          <td>${esc(r.staff.designation||'—')}</td>
          <td>${esc(r.policy.name)}</td>
          <td><span class="tag">${esc(catMap[r.policy.categoryId]||'—')}</span></td>
        </tr>`).join('')}</tbody></table></div>`;
  } else if(state.reportType==='monthly'){
    // monthly compliance — username, staff name, month, year, status
    const mf = state.monthlyFilter || {month:'', year:''};
    const yearFilter = mf.year? +mf.year : null;
    const monthFilter = mf.month!==''? +mf.month : null;

    const filteredStaff = f.employee? staff.filter(s=>String(s.id)===String(f.employee)) : staff;

    // Build a list of (staff x month x year) combinations to show.
    // Strategy: show every (staff, year) combination for the chosen year(s), and all 12 months — OR
    // if year+month specified, just that single row per staff.
    const now=new Date();
    const years = yearFilter? [yearFilter] : Array.from(new Set([
      now.getFullYear(),
      now.getFullYear()-1,
      ...monthlyCerts.map(c=>c.year)
    ])).sort((a,b)=>b-a);
    const months = monthFilter!=null? [monthFilter] : MONTHS.map((_,i)=>i);

    const rows=[];
    filteredStaff.forEach(s=>{
      years.forEach(y=>{
        months.forEach(m=>{
          const cert = monthlyCerts.find(c=>c.userId===s.id && c.month===m && c.year===y);
          rows.push({staff:s, month:m, year:y, cert});
        });
      });
    });
    // Sort: most recent first, then by staff name
    rows.sort((a,b)=>{
      if(b.year!==a.year) return b.year-a.year;
      if(b.month!==a.month) return b.month-a.month;
      return (a.staff.name||'').localeCompare(b.staff.name||'');
    });

    bodyHTML = `<div class="table-wrap"><table class="data" id="reportTable">
      <thead><tr><th>Username</th><th>Staff Name</th><th>Designation</th><th>Month</th><th>Year</th><th>Status</th><th>Submitted On</th></tr></thead>
      <tbody>${rows.length===0? '<tr><td colspan="7" style="text-align:center;color:var(--ink-500);padding:30px">No data</td></tr>' : rows.map(r=>`
        <tr>
          <td><code style="background:var(--bg);padding:2px 8px;border-radius:6px;font-size:12.5px">${esc(r.staff.username)}</code></td>
          <td><strong>${esc(r.staff.name)}</strong></td>
          <td>${esc(r.staff.designation||'—')}</td>
          <td>${MONTHS[r.month]}</td>
          <td>${r.year}</td>
          <td>${r.cert? '<span class="badge green">Accepted</span>':'<span class="badge red">Pending</span>'}</td>
          <td>${r.cert? fmtDT(r.cert.submittedAt):'—'}</td>
        </tr>`).join('')}</tbody></table></div>`;
  }

  return `
    <div class="card">
      <div class="card-head">
        <div><h3>Report Type</h3><p>Select the analysis you want to generate</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ${state.reportType==='employee'?'btn-primary':'btn-ghost'}" data-act="rep-type" data-t="employee">Employee-wise</button>
          <button class="btn ${state.reportType==='policy'?'btn-primary':'btn-ghost'}" data-act="rep-type" data-t="policy">Policy-wise</button>
          <button class="btn ${state.reportType==='pending'?'btn-primary':'btn-ghost'}" data-act="rep-type" data-t="pending">Pending</button>
          <button class="btn ${state.reportType==='monthly'?'btn-primary':'btn-ghost'}" data-act="rep-type" data-t="monthly">Monthly Compliance</button>
        </div>
      </div>
      <div class="card-body">
        <div class="grid-3" style="margin-bottom:16px">
          <div class="form-field"><label>Employee</label><select id="repEmp"><option value="">All employees</option>${staff.map(s=>`<option value="${s.id}" ${f.employee==s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select></div>
          <div class="form-field"><label>Category</label><select id="repCat"><option value="">All categories</option>${cats.map(c=>`<option value="${c.id}" ${f.category==c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
          <div class="form-field"><label>Policy</label><select id="repPol"><option value="">All policies</option>${policies.map(p=>`<option value="${p.id}" ${f.policy==p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
        </div>
        <div class="grid-2" style="margin-bottom:16px">
          <div class="form-field"><label>Date From</label><input type="date" id="repFrom" value="${esc(f.from||'')}"/></div>
          <div class="form-field"><label>Date To</label><input type="date" id="repTo" value="${esc(f.to||'')}"/></div>
        </div>
        ${state.reportType==='monthly'? `
        <div class="grid-2" style="margin-bottom:16px">
          <div class="form-field"><label>Month</label><select id="repMonth"><option value="">All months</option>${MONTHS.map((m,i)=>`<option value="${i}" ${(state.monthlyFilter?.month)==i?'selected':''}>${m}</option>`).join('')}</select></div>
          <div class="form-field"><label>Year</label><select id="repYear"><option value="">All years</option>${(()=>{const ny=new Date().getFullYear();const arr=[];for(let y=ny-3;y<=ny+1;y++)arr.push(y);return arr.map(y=>`<option value="${y}" ${(state.monthlyFilter?.year)==y?'selected':''}>${y}</option>`).join('');})()}</select></div>
        </div>` : ''}
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn btn-primary" id="applyRep">Apply Filters</button>
          <button class="btn btn-ghost" id="resetRep">Reset</button>
          <div style="flex:1"></div>
          <button class="btn btn-green" id="exportExcel">${ICONS.download} Export Excel</button>
          <button class="btn btn-gold" id="exportPDF">${ICONS.print} Export PDF</button>
        </div>
        ${bodyHTML}
      </div>
    </div>
  `;
}

/* ============================================================
   ADMIN — SETTINGS
   ============================================================ */
async function renderSettings(){
  // calculate storage usage from blobs
  const policies=await dbGetAll('policies');
  const archives=await dbGetAll('archives');
  let used=0;
  policies.forEach(p=>{ if(p.documentBase64) used += p.documentBase64.length*0.75; });
  archives.forEach(a=>{ if(a.documentBase64) used += a.documentBase64.length*0.75; });
  const limit=3*1024*1024*1024;
  const pct=Math.min(100, used*100/limit);

  return `
    <div class="grid-2">
      <div class="card">
        <div class="card-head"><div><h3>Backup & Restore</h3><p>Export or restore your entire database</p></div></div>
        <div class="card-body">
          <p style="margin:0 0 14px;font-size:13.5px;color:var(--ink-500)">Backup creates a single JSON file containing all policies, categories, staff, acceptances and archive records. Store it safely.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-green" id="backupBtn">${ICONS.download} Download Backup</button>
            <button class="btn btn-ghost" id="restoreBtn">${ICONS.upload} Restore from File</button>
            <input type="file" id="restoreInput" accept="application/json" style="display:none"/>
          </div>

function showModal({size,title,body,footer,onMount}){
  closeModal();
  const wrap=document.createElement('div');
  wrap.className='modal-backdrop';
  wrap.innerHTML=`<div class="modal ${size||''}">
    <div class="modal-head"><h3>${title||''}</h3><button class="btn-icon" data-close>${ICONS.close}</button></div>
    <div class="modal-body">${body||''}</div>
    ${footer? `<div class="modal-foot">${footer}</div>`:''}
  </div>`;
  $('#modalRoot').appendChild(wrap);
  wrap.addEventListener('click',e=>{
    if(e.target===wrap || e.target.closest('[data-close]')) closeModal();
  });
  document.body.style.overflow='hidden';
  if(onMount) onMount(wrap.querySelector('.modal'));
}
function closeModal(){
  $('#modalRoot').innerHTML='';
  document.body.style.overflow='';
}

/* ============================================================
   EVENT BINDINGS for rendered content
   ============================================================ */
function bindContentHandlers(){
  // search/sort/filter
  const si=$('#searchInput'); if(si) si.addEventListener('input',e=>{state.search=e.target.value;render();});
  const fc=$('#filterCat'); if(fc) fc.addEventListener('change',e=>{state.filterCategory=e.target.value;render();});
  const sb=$('#sortBy'); if(sb) sb.addEventListener('change',e=>{state.sortBy=e.target.value;render();});

  // add buttons
  const addP=$('#addPolicyBtn'); if(addP) addP.addEventListener('click',()=>openPolicyModal());
  const addC=$('#addCatBtn'); if(addC) addC.addEventListener('click',()=>openCategoryModal());
  const addS=$('#addStaffBtn'); if(addS) addS.addEventListener('click',()=>openStaffModal());

  // staff dashboard quick link
  const gp=document.querySelector('[data-act="go-policies"]'); if(gp) gp.addEventListener('click',()=>navigate('policies'));

  // Reports
  $$('[data-act="rep-type"]').forEach(b=>b.addEventListener('click',()=>{ state.reportType=b.dataset.t; render(); }));
  const applyRep=$('#applyRep');
  if(applyRep) applyRep.addEventListener('click',()=>{
    state.reportFilters={
      employee:$('#repEmp').value,category:$('#repCat').value,policy:$('#repPol').value,
      from:$('#repFrom').value,to:$('#repTo').value,
    };
    const rm=$('#repMonth'), ry=$('#repYear');
    if(rm || ry){
      state.monthlyFilter={month:rm?rm.value:'', year:ry?ry.value:''};
    }
    render();
  });
  const resetRep=$('#resetRep');
  if(resetRep) resetRep.addEventListener('click',()=>{
    state.reportFilters={employee:'',category:'',policy:'',from:'',to:''};
    state.monthlyFilter={month:'',year:''};
    render();
  });
  const expE=$('#exportExcel'); if(expE) expE.addEventListener('click',exportReportExcel);
  const expP=$('#exportPDF'); if(expP) expP.addEventListener('click',()=>window.print());

  const printR=$('#printReportBtn'); if(printR) printR.addEventListener('click',()=>window.print());

  // Monthly compliance — staff
  const mcLoad=$('#mcLoadBtn');
  if(mcLoad) mcLoad.addEventListener('click',()=>{
    state.monthlyPick={month:+$('#mcMonth').value, year:+$('#mcYear').value};
    render();
  });
  const mcSubmit=$('#mcSubmitBtn');
  if(mcSubmit) mcSubmit.addEventListener('click',async()=>{
    const agree=$('#mcAgree');
    if(!agree.checked){ toast('Please tick the declaration to submit','error'); return; }
    const month=+$('#mcMonth').value, year=+$('#mcYear').value;
    const certs=await dbGetAll('monthlyCerts');
    const dup=certs.find(c=>c.userId===state.user.id && c.month===month && c.year===year);
    if(dup){ toast('Certificate for this month already submitted','warn'); return; }
    const policies=await dbGetAll('policies');
    await dbAdd('monthlyCerts',{
      userId:state.user.id, userName:state.user.name, username:state.user.username,
      designation:state.user.designation||'', month, year,
      policyIds:policies.map(p=>p.id), policyCount:policies.length,
      submittedAt:Date.now(),
    });
    toast('Monthly compliance certificate submitted');
    state.monthlyPick={month,year};
    render();
  });
  const mcPrint=$('#mcPrintBtn');
  if(mcPrint) mcPrint.addEventListener('click',()=>window.print());

  // Settings
  const bb=$('#backupBtn'); if(bb) bb.addEventListener('click',doBackup);
  const rb=$('#restoreBtn'); if(rb) rb.addEventListener('click',()=>$('#restoreInput').click());
  const ri=$('#restoreInput'); if(ri) ri.addEventListener('change',doRestore);
  const pwf=$('#pwForm'); if(pwf) pwf.addEventListener('submit',changePassword);

  // generic actions via delegation
  $('#content').querySelectorAll('[data-act]').forEach(el=>{
    const act=el.dataset.act;
    const id=el.dataset.id? +el.dataset.id : null;
    if(['view-doc','watch-video','edit-policy','delete-policy','open-cat','edit-cat','delete-cat','edit-staff','delete-staff','view-archive-doc','watch-archive-video','accept-policy'].includes(act)){
      el.addEventListener('click',e=>handleAction(act,id,e));
    }
  });
}

async function handleAction(act,id){
  if(act==='view-doc'){
    const p=await dbGet('policies',id); viewDocument(p);
  } else if(act==='watch-video'){
    const p=await dbGet('policies',id); watchVideo(p);
  } else if(act==='edit-policy'){
    openPolicyModal(id);
  } else if(act==='delete-policy'){
    if(confirm('Delete this policy? Archived versions and acceptances will remain.')){
      await dbDel('policies',id); toast('Policy deleted'); render();
    }
  } else if(act==='open-cat'){
    navigate('policies', {filterCategory:id});
  } else if(act==='edit-cat'){
    const c=await dbGet('categories',id); openCategoryModal(id,c);
  } else if(act==='delete-cat'){
    const polls=await dbGetAll('policies');
    if(polls.find(p=>p.categoryId===id)){ toast('Cannot delete — policies exist in this category','error'); return; }
    if(confirm('Delete this category?')){
      await dbDel('categories',id); toast('Category deleted'); render();
    }
  } else if(act==='edit-staff'){
    openStaffModal(id);
  } else if(act==='delete-staff'){
    if(confirm('Delete this staff member? Their acceptance records will remain on file.')){
      await dbDel('users',id); toast('Staff deleted'); render();
    }
  } else if(act==='view-archive-doc'){
    const a=await dbGet('archives',id); viewDocument(a,'archives');
  } else if(act==='watch-archive-video'){
    const a=await dbGet('archives',id); watchVideo(a);
  } else if(act==='accept-policy'){
    const all=await dbGetAll('acceptances');
    if(all.find(x=>x.userId===state.user.id && x.policyId===id)){ toast('Already accepted','warn'); return; }
    await dbAdd('acceptances',{userId:state.user.id,policyId:id,acceptedAt:Date.now()});
    toast('Policy accepted. Thank you!');
    render();
  }
}

function tableToCSV(tbl){
  const rows=[...tbl.querySelectorAll('tr')];
  return rows.map(r=>[...r.querySelectorAll('th,td')].map(c=>{
    let t=c.innerText.replace(/\s+/g,' ').trim();
    if(t.includes(',')||t.includes('"')||t.includes('\n')) t='"'+t.replace(/"/g,'""')+'"';
    return t;
  }).join(',')).join('\r\n');
}
function downloadFile(name,content,type='text/plain'){
  const blob=content instanceof Blob? content : new Blob([content],{type});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}

function exportReportExcel(){
  const tbl=$('#reportTable');
  if(!tbl){ toast('No table to export','warn'); return; }
  const csv=tableToCSV(tbl);
  downloadFile(`POPMS-report-${Date.now()}.csv`,'\uFEFF'+csv,'text/csv;charset=utf-8');
  toast('Excel (CSV) downloaded');
}

async function doBackup(){
  const data={};
  for(const s of STORES){ data[s]=await dbGetAll(s); }
  data._meta={version:1,exportedAt:new Date().toISOString(),system:'POPMS'};
  const json=JSON.stringify(data);
  downloadFile(`POPMS-backup-${new Date().toISOString().slice(0,10)}.json`,json,'application/json');
  toast('Backup downloaded');
}

async function doRestore(e){
  const f=e.target.files[0]; if(!f) return;
  if(!confirm('Restoring will REPLACE all current data with the backup. Continue?')) { e.target.value=''; return; }
  try{
    const txt=await f.text();
    const data=JSON.parse(txt);
    for(const s of STORES){
      await dbClear(s);
      if(Array.isArray(data[s])){
        for(const item of data[s]){ await dbPut(s,item); }
      }
    }
    toast('Restore complete. Reloading…');
    setTimeout(()=>location.reload(),900);
  }catch(err){
    console.error(err); toast('Invalid backup file','error');
  }
  e.target.value='';
}

async function changePassword(e){
  e.preventDefault();
  const cur=$('#curPw').value, nw=$('#newPw').value, cn=$('#conPw').value;
  if(cur!==state.user.password){ toast('Current password incorrect','error'); return; }
  if(nw.length<4){ toast('Password too short','error'); return; }
  if(nw!==cn){ toast('Passwords do not match','error'); return; }
  state.user.password=nw;
  await dbPut('users',state.user);
  toast('Password updated');
  $('#pwForm').reset();
}

  }
})();
</script>
