# 1. Catch-all block: Drop direct IP access and unknown domains
server {
    listen 80 default_server;
    server_name _;
    return 444; # Connection closed without response
}

# 2. Main Application Block
server {
    listen 80;
    server_name reports.parimanglobal.com;

    # INCREASE UPLOAD LIMIT FOR JSON/EXCEL FILES
    client_max_body_size 50M;

    # Allow Let's Encrypt to verify the domain for SSL issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Standardize proxy headers for Flask security and URL generation
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Master Portal (Gateway & Auth)
    location / {
        proxy_pass http://portal:8000;
    }

    # ITR Service
    location /itr/ {
        proxy_pass http://itr:5000/;
    }

    # Policy Service
    location /policy/ {
        proxy_pass http://policy:5000/;
    }

    # Database Admin - Locked down with HTTP Basic Auth
    location /db-admin/ {
        auth_basic "Restricted Database Access";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
        proxy_pass http://adminer:8080;
    }
}