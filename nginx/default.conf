# 1. Catch-all block: Drop direct IP access and unknown domains
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on; # Drops TLS handshake for invalid domains
    return 444; # Connection closed without response
}

# 2. Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name reports.parimanglobal.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. Main HTTPS Application Block
server {
    listen 443 ssl;
    server_name reports.parimanglobal.com;

    client_max_body_size 50M;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/reports.parimanglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reports.parimanglobal.com/privkey.pem;

    # Standard SSL security hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Standardize proxy headers for Flask security and URL generation
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Master Portal (Gateway & Auth)
    location / {
        proxy_pass http://portal:8000;
    }

    # ITR Service
    location /itr/ {
        proxy_pass http://itr:5000/;
    }

    # Policy Service
    location /policy/ {
        proxy_pass http://policy:5000/;
    }

    # Database Admin - Locked down with HTTP Basic Auth
    location /db-admin/ {
        auth_basic "Restricted Database Access";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
        proxy_pass http://adminer:8080;
    }
}
